<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Markets — AGSV Fantasy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-markets">
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-circle" aria-hidden="true"></div>

  <header class="site-header">
    <a href="/" class="brand">AGSV Fantasy</a>
    <nav class="site-nav" aria-label="Main">
      <a href="/">Home</a>
      <a href="/markets.html" class="nav-active">Markets</a>
      <a href="/leaderboard.html">Leaderboard</a>
      <a href="/profile.html">Profile</a>
      <a href="/admin.html" id="nav-admin" hidden>Admin</a>
    </nav>
    <div class="header-auth">
      <div id="user-pill" class="user-pill" hidden></div>
      <div class="credits-pill" id="credits-pill" hidden title="Play-money balance">
        <span class="credits-label">Balance</span>
        <span class="credits-value" id="credits-display">1,000</span>
        <span class="credits-unit">credits</span>
      </div>
      <div id="auth-actions" class="auth-actions">
        <a href="/signin.html" class="btn btn-ghost btn-sm">Sign in</a>
        <a href="/register.html" class="btn btn-ghost btn-sm">Register</a>
      </div>
      <a href="#" id="logout-btn" class="btn btn-ghost btn-sm" hidden role="button">Sign out</a>
    </div>
  </header>

  <main class="markets-page">
    <div class="markets-head">
      <h1 class="page-title" id="page-title">Markets</h1>
      <p class="page-lead" id="page-lead">Browse past rounds or bet on the current round.</p>

      <div class="picker-row">
        <div class="sport-picker" id="sport-picker" aria-label="Sport"></div>
      </div>
      <div class="picker-row">
        <div class="round-picker" id="round-picker" aria-label="Round"></div>
      </div>

      <div class="markets-tabs">
        <button type="button" class="tab-btn tab-active" data-tab="fixtures">Fixtures</button>
        <button type="button" class="tab-btn" data-tab="my-bets">My bets</button>
      </div>
    </div>

    <div id="tab-fixtures" class="tab-panel">
      <div id="fixtures-list"></div>
    </div>

    <div id="tab-my-bets" class="tab-panel" hidden>
      <p id="my-bets-guest" class="empty-cell" hidden>Sign in to see your bets.</p>
      <div id="my-bets-list" class="my-bets-list"></div>
    </div>
  </main>

  <div id="match-modal" class="match-modal" hidden>
    <div class="match-modal-backdrop" data-close></div>
    <div class="match-modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button type="button" class="modal-close" data-close aria-label="Close">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script type="module" src="/js/markets.js"></script>
</body>
</html>
