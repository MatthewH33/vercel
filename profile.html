<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Profile — AGSV Fantasy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-profile">
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-circle" aria-hidden="true"></div>

  <header class="site-header">
    <a href="/" class="brand">AGSV Fantasy</a>
    <nav class="site-nav" aria-label="Main">
      <a href="/">Home</a>
      <a href="/markets.html">Markets</a>
      <a href="/leaderboard.html">Leaderboard</a>
      <a href="/profile.html" class="nav-active">Profile</a>
      <a href="/admin.html" id="nav-admin" hidden>Admin</a>
    </nav>
    <div class="header-auth">
      <div id="user-pill" class="user-pill" hidden></div>
      <div class="credits-pill" id="credits-pill" hidden title="Play-money balance">
        <span class="credits-label">Balance</span>
        <span class="credits-value" id="credits-display">—</span>
        <span class="credits-unit">credits</span>
      </div>
      <div id="auth-actions" class="auth-actions">
        <a href="/signin.html" class="btn btn-ghost btn-sm">Sign in</a>
        <a href="/register.html" class="btn btn-ghost btn-sm">Register</a>
      </div>
      <a href="#" id="logout-btn" class="btn btn-ghost btn-sm" hidden role="button">Sign out</a>
    </div>
  </header>

  <main class="profile-page">
    <div id="profile-guest" class="profile-guest" hidden>
      <h1 class="page-title">Your profile</h1>
      <p class="page-lead">Sign in to see your stats and full bet history.</p>
      <div class="hero-actions">
        <a href="/signin.html" class="btn btn-primary">Sign in</a>
        <a href="/register.html" class="btn btn-ghost">Register</a>
      </div>
    </div>

    <div id="profile-content" hidden>
      <header class="profile-header">
        <div class="profile-identity">
          <h1 class="page-title" id="profile-username">@player</h1>
          <p class="profile-school" id="profile-school"></p>
          <p class="profile-meta" id="profile-meta"></p>
        </div>
        <div class="profile-rank-pill" id="profile-rank" hidden></div>
      </header>

      <section class="stats-grid" aria-label="Betting statistics">
        <article class="stat-card">
          <span class="stat-label">Balance</span>
          <span class="stat-value" id="stat-credits">—</span>
        </article>
        <article class="stat-card">
          <span class="stat-label">Total bets</span>
          <span class="stat-value" id="stat-total-bets">0</span>
        </article>
        <article class="stat-card">
          <span class="stat-label">Win rate</span>
          <span class="stat-value" id="stat-win-rate">—</span>
        </article>
        <article class="stat-card">
          <span class="stat-label">Profit (settled)</span>
          <span class="stat-value" id="stat-profit">0</span>
        </article>
        <article class="stat-card">
          <span class="stat-label">Won / Lost / Pending</span>
          <span class="stat-value stat-value-sm" id="stat-record">0 / 0 / 0</span>
        </article>
        <article class="stat-card">
          <span class="stat-label">Total staked</span>
          <span class="stat-value" id="stat-staked">0</span>
        </article>
      </section>

      <section class="board-section">
        <div class="section-head-row">
          <h2 class="section-title">Bet history</h2>
          <div class="filter-pills" id="bet-filters" role="tablist" aria-label="Filter bets">
            <button type="button" class="filter-pill filter-active" data-filter="all">All</button>
            <button type="button" class="filter-pill" data-filter="pending">Pending</button>
            <button type="button" class="filter-pill" data-filter="won">Won</button>
            <button type="button" class="filter-pill" data-filter="lost">Lost</button>
          </div>
        </div>
        <div id="bets-history" class="bets-history"></div>
      </section>
    </div>
  </main>

  <script type="module" src="/js/profile.js"></script>
</body>
</html>
