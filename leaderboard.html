<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Leaderboard — AGSV Fantasy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-leaderboard">
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-circle" aria-hidden="true"></div>

  <header class="site-header">
    <a href="/" class="brand">AGSV Fantasy</a>
    <nav class="site-nav" aria-label="Main">
      <a href="/">Home</a>
      <a href="/markets.html">Markets</a>
      <a href="/leaderboard.html" class="nav-active">Leaderboard</a>
      <a href="/profile.html">Profile</a>
      <a href="/admin.html" id="nav-admin" hidden>Admin</a>
    </nav>
    <div class="header-auth">
      <div id="user-pill" class="user-pill" hidden></div>
      <div class="credits-pill" id="credits-pill" hidden title="Play-money balance">
        <span class="credits-label">Balance</span>
        <span class="credits-value" id="credits-display">—</span>
        <span class="credits-unit">credits</span>
      </div>
      <div id="auth-actions" class="auth-actions">
        <a href="/signin.html" class="btn btn-ghost btn-sm">Sign in</a>
        <a href="/register.html" class="btn btn-ghost btn-sm">Register</a>
      </div>
      <a href="#" id="logout-btn" class="btn btn-ghost btn-sm" hidden role="button">Sign out</a>
    </div>
  </header>

  <main class="leaderboard-page">
    <h1 class="page-title">Leaderboard</h1>
    <p class="page-lead">Rankings by credits. Schools compete on combined totals.</p>

    <section class="board-section">
      <h2 class="section-title">Top players</h2>
      <div class="table-wrap">
        <table class="leaderboard-table" id="players-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Player</th>
              <th>School</th>
              <th>Credits</th>
            </tr>
          </thead>
          <tbody id="players-body">
            <tr><td colspan="4" class="empty-cell">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="board-section">
      <h2 class="section-title">School standings</h2>
      <div class="table-wrap">
        <table class="leaderboard-table" id="schools-table">
          <thead>
            <tr>
              <th>#</th>
              <th>School</th>
              <th>Players</th>
              <th>Total credits</th>
            </tr>
          </thead>
          <tbody id="schools-body">
            <tr><td colspan="4" class="empty-cell">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="/js/leaderboard.js"></script>
</body>
</html>
